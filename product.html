<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Essential Tee | AURA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-white text-gray-900 font-sans antialiased">

  <header class="border-b border-gray-100 py-6 px-8 flex justify-between items-center">
    <a href="index.html" class="text-2xl font-extrabold font-serif">AURA<span class="text-amber-600">.</span></a>
    <a href="index.html" class="text-xs uppercase tracking-widest text-gray-500 hover:text-black">&larr; Back To Store</a>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
      
      <!-- Gallery Column -->
      <div class="space-y-4">
        <div class="w-full h-[550px] bg-gray-100 overflow-hidden">
          <img id="main-img" src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=800" class="w-full h-full object-cover" alt="Main View">
        </div>
      </div>

      <!-- Specs Column -->
      <div class="flex flex-col justify-center">
        <span class="text-xs uppercase tracking-widest text-amber-600 font-semibold mb-2">New Arrival</span>
        <h1 class="text-4xl font-serif text-gray-900 font-light mb-4">Aura Essential Tee</h1>
        <p class="text-2xl font-semibold mb-6">$65.00</p>
        <p class="text-sm text-gray-600 leading-relaxed mb-8">Crafted from 100% long-staple Peruvian Pima cotton, offering an unmatchable drape, exceptional softness, and long-lasting durability.</p>

        <!-- Size Selector -->
        <div class="mb-8">
          <label class="block text-xs uppercase tracking-wider font-semibold mb-3">Select Size</label>
          <div class="flex gap-3">
            <button class="w-12 h-12 border border-gray-200 text-xs font-semibold hover:border-black">S</button>
            <button class="w-12 h-12 border border-black text-xs font-semibold bg-black text-white">M</button>
            <button class="w-12 h-12 border border-gray-200 text-xs font-semibold hover:border-black">L</button>
            <button class="w-12 h-12 border border-gray-200 text-xs font-semibold hover:border-black">XL</button>
          </div>
        </div>

        <button onclick="alert('Item added! Return to homepage to view cart.')" class="w-full py-5 bg-amber-600 text-white text-xs uppercase tracking-widest font-semibold hover:bg-amber-700 transition mb-4">Add To Bag</button>
      </div>

    </div>
  </main>
</body>
</html>
