<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | AURA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 min-h-screen">
    
    <!-- Left: Form -->
    <div class="lg:col-span-7 p-8 sm:p-16 bg-white">
      <a href="index.html" class="text-2xl font-extrabold font-serif">AURA<span class="text-amber-600">.</span></a>
      <h2 class="text-xl font-serif mt-8 mb-6 font-semibold">Shipping Details</h2>

      <form class="space-y-4" onsubmit="event.preventDefault(); alert('Order placed successfully! Demo complete.');">
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-500 mb-1">Email Address</label>
          <input type="email" required class="w-full border border-gray-200 p-3 text-sm focus:border-amber-600 outline-none">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs uppercase tracking-wider text-gray-500 mb-1">First Name</label>
            <input type="text" required class="w-full border border-gray-200 p-3 text-sm focus:border-amber-600 outline-none">
          </div>
          <div>
            <label class="block text-xs uppercase tracking-wider text-gray-500 mb-1">Last Name</label>
            <input type="text" required class="w-full border border-gray-200 p-3 text-sm focus:border-amber-600 outline-none">
          </div>
        </div>
        <div>
          <label class="block text-xs uppercase tracking-wider text-gray-500 mb-1">Shipping Address</label>
          <input type="text" required class="w-full border border-gray-200 p-3 text-sm focus:border-amber-600 outline-none">
        </div>

        <button type="submit" class="w-full py-4 bg-black text-white text-xs uppercase tracking-widest font-semibold hover:bg-amber-600 transition mt-6">Complete Purchase</button>
      </form>
    </div>

    <!-- Right: Order Summary -->
    <div class="lg:col-span-5 p-8 sm:p-16 bg-gray-100 border-l border-gray-200">
      <h3 class="text-lg font-serif mb-6 font-semibold">Order Summary</h3>
      <div class="space-y-4 border-b border-gray-200 pb-6 mb-6">
        <div class="flex justify-between text-sm">
          <span>Aura Essential Tee (Size: M)</span>
          <span class="font-semibold">$65.00</span>
        </div>
      </div>
      <div class="flex justify-between text-lg font-bold">
        <span>Total Due</span>
        <span>$65.00</span>
      </div>
    </div>

  </div>
</body>
</html>
